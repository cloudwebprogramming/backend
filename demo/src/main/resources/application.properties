spring.application.name=demo

# Mail Configuration (Naver SMTP)
spring.mail.host=smtp.naver.com
spring.mail.port=465
spring.mail.username=YOUR_NAVER_EMAIL@naver.com
spring.mail.password=YOUR_NAVER_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false

# JWT Configuration
jwt.secret=your_secret_key_change_this_in_production
jwt.expiration=86400000

# School domain
school.email.domain=@kangnam.ac.kr
